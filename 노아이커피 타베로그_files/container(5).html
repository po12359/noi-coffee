  width: 100%;
  text-decoration: none;
}

.ad-rstside-tieup__target:active {
  text-decoration: none;
}
.ad-rstside-tieup__banner {
  display: table-cell;
  width: 70px;
  vertical-align: top;
}

  height: 70px;
}

  bottom: -1px;

  font-size: 11px;
  text-align: center;
  line-height: 16px;
  content: "PR";
  background: rgba(0, 0, 0, 0.5);
}

  border: 1px solid transparent;
}

  border: 1px solid #ff9600;

}

  display: table-cell;
  padding-left: 11px;
  vertical-align: top;
}
.ad-rstside-tieup__title {
  margin: 0 0 5px 0;
  color: #0066cc;
  font-weight: bold;
  line-height: 1.2;
}
.ad-rstside-tieup__target:hover .ad-rstside-tieup__title,
.ad-rstside-tieup__target:active .ad-rstside-tieup__title {
  color: #ff9600;
  text-decoration: underline;
}

  margin: 0;
  color: #595960;
  line-height: 1.4;
